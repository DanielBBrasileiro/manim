# contracts/layout.yaml v4.1

formats:
  # ── Base formats ──────────────────────────────
  vertical_9_16:
    width: 1080
    height: 1920
    safe_zone: 0.08
    text_zones:
      top: { y: "15%", height: "15%" }
      bottom: { y: "70%", height: "15%" }
      center: { y: "42%", height: "16%" }

  wide_16_9:
    width: 1920
    height: 1080
    safe_zone: 0.06

  square_1_1:
    width: 1080
    height: 1080
    safe_zone: 0.10

  # ── Social Media Specs ────────────────────────
  instagram_reel:
    width: 1080
    height: 1920
    fps: 30
    max_duration: 90
    safe_zone: 0.10                  # Extra breathing for UI chrome
    alias: vertical_9_16

  instagram_post:
    width: 1080
    height: 1080
    fps: null
    safe_zone: 0.10
    alias: square_1_1

  instagram_story:
    width: 1080
    height: 1920
    fps: 30
    max_duration: 15
    safe_zone: 0.12                  # Stories have heavy UI chrome
    alias: vertical_9_16

  instagram_carousel:
    width: 1080
    height: 1080
    fps: null
    max_frames: 10
    safe_zone: 0.10
    alias: square_1_1

  tiktok:
    width: 1080
    height: 1920
    fps: 30
    max_duration: 600
    safe_zone: 0.14                  # TikTok UI is aggressive
    alias: vertical_9_16

  linkedin_video:
    width: 1920
    height: 1080
    fps: 30
    max_duration: 600
    safe_zone: 0.06
    alias: wide_16_9

  linkedin_post:
    width: 1200
    height: 627
    fps: null
    safe_zone: 0.08

  linkedin_square:
    width: 1080
    height: 1350
    fps: null
    safe_zone: 0.10

  twitter_video:
    width: 1280
    height: 720
    fps: 30
    max_duration: 140
    safe_zone: 0.06

  twitter_thumbnail:
    width: 1200
    height: 675
    fps: null
    safe_zone: 0.06

  youtube_shorts:
    width: 1080
    height: 1920
    fps: 60
    max_duration: 60
    safe_zone: 0.08
    alias: vertical_9_16

  youtube_thumbnail:
    width: 1280
    height: 720
    fps: null
    safe_zone: 0.06

default_output_target: short_cinematic_vertical

output_targets:
  short_cinematic_vertical:
    format: vertical_9_16
    alias: instagram_reel
    channel: instagram_reel
    purpose: short_form_social
    priority: 100
    default: true
    render_mode: video
    composition: short-cinematic-vertical
    legacy_composition: CinematicNarrative-v4
    legacy_aliases: [vertical_social, short_cinematic]
    label: "Short Cinematic Vertical"
    fps: 60
    safe_zone: 0.10
    preferred_channels:
      - instagram_reel
      - tiktok
      - youtube_shorts
      - instagram_story

  linkedin_feed_4_5:
    format: linkedin_square
    alias: linkedin_square
    channel: linkedin_feed
    purpose: premium_still
    priority: 80
    render_mode: still
    composition: linkedin-feed-4-5
    legacy_composition: LinkedInStill-v4
    legacy_aliases: [square_social, linkedin_still, linkedin_post]
    label: "LinkedIn Feed 4:5"
    fps: 30
    safe_zone: 0.10
    preferred_channels:
      - linkedin_feed
      - linkedin_square

  linkedin_carousel_square:
    format: square_1_1
    alias: instagram_carousel
    channel: linkedin_carousel
    purpose: narrative_carousel
    priority: 75
    render_mode: carousel
    composition: linkedin-carousel-square
    legacy_composition: CarouselSlide-v4
    legacy_aliases: [instagram_carousel, carousel_slide]
    label: "LinkedIn Carousel Square"
    fps: 30
    safe_zone: 0.10
    min_slides: 5
    max_slides: 9
    preferred_channels:
      - linkedin_carousel
      - instagram_carousel

  youtube_essay_16_9:
    format: wide_16_9
    alias: linkedin_video
    channel: youtube_video
    purpose: visual_essay
    priority: 70
    render_mode: video
    composition: youtube-essay-16-9
    legacy_composition: YouTubeEssay-v4
    legacy_aliases: [wide_showcase, youtube_essay]
    label: "YouTube Essay 16:9"
    fps: 30
    safe_zone: 0.06
    preferred_channels:
      - youtube_video
      - linkedin_video
      - twitter_video

  youtube_thumbnail_16_9:
    format: youtube_thumbnail
    alias: youtube_thumbnail
    channel: youtube_thumbnail
    purpose: thumbnail
    priority: 65
    render_mode: still
    composition: youtube-thumbnail-16-9
    legacy_composition: Thumbnail-v4
    legacy_aliases: [thumbnail]
    label: "YouTube Thumbnail 16:9"
    fps: 30
    safe_zone: 0.08
    preferred_channels:
      - youtube_thumbnail

  loop_gif_square:
    format: square_1_1
    alias: instagram_post
    channel: loop_gif
    purpose: loop_gif
    priority: 60
    render_mode: video
    native_support: false
    output_ext: .gif
    composition: linkedin-carousel-square
    legacy_aliases: [gif_square, motion_loop_square]
    label: "Loop GIF Square"
    fps: 24
    safe_zone: 0.10
    preferred_channels:
      - linkedin_feed
      - instagram_post

  loop_gif_vertical:
    format: vertical_9_16
    alias: instagram_reel
    channel: loop_gif
    purpose: loop_gif
    priority: 58
    render_mode: video
    native_support: false
    output_ext: .gif
    composition: short-cinematic-vertical
    legacy_aliases: [gif_vertical, motion_loop_vertical]
    label: "Loop GIF Vertical"
    fps: 24
    safe_zone: 0.10
    preferred_channels:
      - instagram_story
      - instagram_reel

  motion_preview_webm:
    format: wide_16_9
    alias: twitter_video
    channel: motion_preview
    purpose: motion_preview
    priority: 55
    render_mode: video
    native_support: false
    output_ext: .webm
    composition: youtube-essay-16-9
    legacy_aliases: [preview_webm, motion_preview]
    label: "Motion Preview WebM"
    fps: 24
    safe_zone: 0.06
    preferred_channels:
      - twitter_video
      - linkedin_video

composition:
  rule_of_thirds: true
  center_bias: 0.6                   # 60% of content in central zone
  edge_breathing: "64px"             # Minimum breathing room
