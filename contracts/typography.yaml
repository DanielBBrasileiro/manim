# contracts/typography.yaml v4

fonts:
  narrative:
    family: "PP Neue Montreal, Inter, Helvetica Neue, sans-serif"
    weights:
      whisper: 300                 # Reflection
      statement: 500               # Affirmation
    
  brand:
    family: "Cal Sans"
    weight: 600
    use: "Only for final resolve logo"

rules:
  semantic_sizing:
    COMPACT:
      display_large: "clamp(3rem, 10vw, 4rem)"
      headline_large: "clamp(2rem, 6vw, 2.5rem)"
      headline_small: "clamp(1.5rem, 5vw, 2rem)"
      body_medium: "clamp(1rem, 4vw, 1.25rem)"
      label_small: "0.875rem"
    MEDIUM:
      display_large: "clamp(3.5rem, 8vw, 4.5rem)"
      headline_large: "clamp(2.25rem, 5vw, 3rem)"
      headline_small: "clamp(1.75rem, 4vw, 2.25rem)"
      body_medium: "1.25rem"
      label_small: "0.875rem"
    EXPANDED:
      display_large: "clamp(4.5rem, 6vw, 6rem)"
      headline_large: "clamp(3rem, 5vw, 4rem)"
      headline_small: "clamp(2rem, 3vw, 2.75rem)"
      body_medium: "1.5rem"
      label_small: "1rem"

  behavior:
    entrance: "fade_up_8px"        # Never snap. Always ease.
    exit: "fade_down_4px"
    sync_mode: "beat_aligned"       # Text enters on narrative beat
    
  anti_patterns:
    - "NEVER use text-transform: uppercase in narrative texts"
    - "NEVER use font-weight > 500 for body text"
    - "NEVER put text inside containers (boxes/badges)"
    - "NEVER use more than 2 font sizes per frame"
    
  positioning:
    vertical_rule: >
      Narrative text stays in 2 zones: 
      top_zone (15% to 30% from top) or 
      bottom_zone (70% to 85% from bottom).
      NEVER in the vertical center (reserved for climax).
